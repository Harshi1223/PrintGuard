<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintGuard — Farm Monitor</title>
<style>
  :root {
    --bg: #121417;
    --panel: #1a1d22;
    --panel-raised: #20242a;
    --border: #2a2f37;
    --text: #e7e9ec;
    --text-dim: #8b919b;
    --text-faint: #565c66;
    --healthy: #3ecf8e;
    --warning: #f5a623;
    --critical: #ff5a5f;
    --idle: #5b6472;
    --accent: #4a9eff;
    --mono: "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ---------- Header ---------- */

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand-mark {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.02em;
  }

  .brand-mark .dot {
    color: var(--healthy);
  }

  .brand-sub {
    font-size: 12px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-strip {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .count-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }

  .count-chip .swatch {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  .count-chip strong {
    color: var(--text);
    font-size: 15px;
  }

  .refresh-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #lastUpdated {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
  }

  button.refresh-btn {
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 7px 13px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  button.refresh-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  button.refresh-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------- Alerts strip ---------- */

  .alerts-panel {
    margin-bottom: 24px;
  }

  .alerts-panel.empty {
    display: none;
  }

  .alerts-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .alert-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(255, 90, 95, 0.07);
    border: 1px solid rgba(255, 90, 95, 0.25);
    border-radius: 7px;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .alert-row .printer-tag {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--critical);
    min-width: 78px;
  }

  .alert-row .alert-desc {
    color: var(--text-dim);
  }

  .alert-row .alert-desc b {
    color: var(--text);
    font-weight: 600;
  }

  /* ---------- Printer grid ---------- */

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--status-color, var(--idle));
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .printer-id {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .job-name {
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 3px;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 100px;
    color: var(--status-color, var(--idle));
    background: color-mix(in srgb, var(--status-color, var(--idle)) 15%, transparent);
    white-space: nowrap;
  }

  /* LCD-style readouts */

  .readouts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .readout {
    background: #0d0f12;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }

  .readout-label {
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 3px;
  }

  .readout-value {
    font-family: var(--mono);
    font-size: 18px;
    font-variant-numeric: tabular-nums;
    color: var(--status-color, var(--healthy));
    text-shadow: 0 0 12px color-mix(in srgb, var(--status-color, var(--healthy)) 45%, transparent);
  }

  .readout-value .unit {
    font-size: 11px;
    color: var(--text-faint);
    text-shadow: none;
    margin-left: 2px;
  }

  /* Progress bars */

  .bar-row {
    margin-bottom: 8px;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    color: var(--text-faint);
    margin-bottom: 4px;
    font-family: var(--mono);
  }

  .bar-track {
    height: 5px;
    background: #0d0f12;
    border-radius: 100px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .bar-fill.progress { background: var(--accent); }
  .bar-fill.filament { background: var(--healthy); }

  /* Card alerts */

  .card-alerts {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-alert-item {
    font-size: 11.5px;
    color: var(--critical);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .card-alert-item::before {
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--critical);
    flex-shrink: 0;
  }

  /* History toggle */

  .history-toggle {
    margin-top: 12px;
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .history-toggle:hover { color: var(--accent); }

  .history-panel {
    margin-top: 10px;
    display: none;
  }

  .history-panel.open { display: block; }

  .sparkline-wrap {
    background: #0d0f12;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
  }

  .sparkline-caption {
    font-size: 9.5px;
    color: var(--text-faint);
    font-family: var(--mono);
    margin-top: 4px;
  }

  /* Empty / loading / error states */

  .state-panel {
    text-align: center;
    padding: 70px 20px;
    color: var(--text-faint);
  }

  .state-panel .state-title {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .state-panel .state-detail {
    font-size: 13px;
    max-width: 440px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .state-panel code {
    background: var(--panel-raised);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand">
      <div class="brand-mark">PRINT<span class="dot">GUARD</span></div>
      <div class="brand-sub">Farm Monitor</div>
    </div>

    <div class="status-strip" id="statusStrip"></div>

    <div class="refresh-row">
      <span id="lastUpdated">—</span>
      <button class="refresh-btn" id="refreshBtn">Refresh now</button>
    </div>
  </header>

  <div class="alerts-panel empty" id="alertsPanel">
    <div class="alerts-title">Active alerts</div>
    <div id="alertsList"></div>
  </div>

  <div id="content">
    <div class="state-panel">
      <div class="state-title">Connecting to the farm…</div>
      <div class="state-detail">Fetching printer status.</div>
    </div>
  </div>

</div>

<script>
 
  const CONFIG = {
        API_BASE_URL: "https://rrcpkz0lqb.execute-api.us-east-1.amazonaws.com/prod",

    // How often the dashboard re-polls the API, in milliseconds.
    POLL_INTERVAL_MS: 20000,
  };
  // ------------------------------------------------------------------

  const STATUS_COLOR = {
    Healthy: "var(--healthy)",
    Warning: "var(--warning)",
    Critical: "var(--critical)",
  };

  const el = {
    content: document.getElementById("content"),
    statusStrip: document.getElementById("statusStrip"),
    alertsPanel: document.getElementById("alertsPanel"),
    alertsList: document.getElementById("alertsList"),
    lastUpdated: document.getElementById("lastUpdated"),
    refreshBtn: document.getElementById("refreshBtn"),
  };

  let pollTimer = null;
  const openHistoryCards = new Set(); // remembers which cards had history expanded across refreshes

  function isConfigured() {
    return CONFIG.API_BASE_URL && !CONFIG.API_BASE_URL.includes("PASTE_YOUR");
  }

  async function apiGet(path) {
    const res = await fetch(`${CONFIG.API_BASE_URL}${path}`);
    if (!res.ok) {
      throw new Error(`${path} returned ${res.status}`);
    }
    return res.json();
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str == null ? "" : String(str);
    return d.innerHTML;
  }

  function fmtNum(v, digits = 1) {
    if (v === undefined || v === null) return "—";
    return Number(v).toFixed(digits);
  }

  function renderUnconfiguredState() {
    el.content.innerHTML = `
      <div class="state-panel">
        <div class="state-title">No API connected yet</div>
        <div class="state-detail">
          Set <code>CONFIG.API_BASE_URL</code> near the top of the
          <code>&lt;script&gt;</code> tag in this file to your API Gateway
          Invoke URL, then reload this page.
        </div>
      </div>`;
  }

  function renderErrorState(message) {
    el.content.innerHTML = `
      <div class="state-panel">
        <div class="state-title">Couldn't reach the farm</div>
        <div class="state-detail">${escapeHtml(message)}<br>Retrying automatically every ${CONFIG.POLL_INTERVAL_MS / 1000}s.</div>
      </div>`;
  }

  function renderEmptyState() {
    el.content.innerHTML = `
      <div class="state-panel">
        <div class="state-title">No printers reporting yet</div>
        <div class="state-detail">Once the fog node sends its first batch, printers will appear here automatically.</div>
      </div>`;
  }

  function renderStatusStrip(printers) {
    const counts = { Healthy: 0, Warning: 0, Critical: 0 };
    printers.forEach(p => {
      const status = p.fog_health_status;
      if (counts[status] !== undefined) counts[status]++;
    });

    el.statusStrip.innerHTML = `
      <div class="count-chip"><span class="swatch" style="background:var(--healthy)"></span><strong>${counts.Healthy}</strong>&nbsp;healthy</div>
      <div class="count-chip"><span class="swatch" style="background:var(--warning)"></span><strong>${counts.Warning}</strong>&nbsp;warning</div>
      <div class="count-chip"><span class="swatch" style="background:var(--critical)"></span><strong>${counts.Critical}</strong>&nbsp;critical</div>
    `;
  }

  function renderAlerts(alerts) {
    if (!alerts || alerts.length === 0) {
      el.alertsPanel.classList.add("empty");
      el.alertsList.innerHTML = "";
      return;
    }
    el.alertsPanel.classList.remove("empty");
    el.alertsList.innerHTML = alerts.map(a => {
      const descriptions = (a.fog_alerts || [])
        .map(x => `<b>${escapeHtml(x.type)}</b> (${escapeHtml(x.severity)})`)
        .join(", ");
      return `
        <div class="alert-row">
          <span class="printer-tag">${escapeHtml(a.printer_id)}</span>
          <span class="alert-desc">${descriptions}</span>
        </div>`;
    }).join("");
  }

  function dualTempChartSvg(nozzleValues, bedValues) {
    if (!nozzleValues || nozzleValues.length < 2) {
      return `<div class="sparkline-caption">Not enough history yet for a trend.</div>`;
    }
    const w = 260, h = 60, pad = 6;
    const all = nozzleValues.concat(bedValues);
    const min = Math.min(...all);
    const max = Math.max(...all);
    const range = max - min || 1;
    const step = (w - pad * 2) / (nozzleValues.length - 1);

    const toPoints = (values) => values.map((v, i) => {
      const x = pad + i * step;
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(" ");

    return `
      <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
        <polyline points="${toPoints(nozzleValues)}" fill="none" stroke="var(--critical)" stroke-width="1.5" />
        <polyline points="${toPoints(bedValues)}" fill="none" stroke="var(--accent)" stroke-width="1.5" />
      </svg>
      <div class="sparkline-caption">
        <span style="color:var(--critical)">■</span> Nozzle &nbsp;
        <span style="color:var(--accent)">■</span> Bed &nbsp;·&nbsp;
        last ${nozzleValues.length} readings · ${fmtNum(min, 0)}–${fmtNum(max, 0)}°C
      </div>
    `;
  }

  function estimateTimeRemaining(history, currentProgress) {
    const withProgress = history.filter(r => r.progress !== undefined && r.timestamp);
    if (withProgress.length < 2 || currentProgress === undefined || currentProgress >= 100) {
      return null;
    }
    const first = withProgress[0];
    const last = withProgress[withProgress.length - 1];
    const progressDelta = last.progress - first.progress;
    const timeDeltaSec = (new Date(last.timestamp) - new Date(first.timestamp)) / 1000;
    if (progressDelta <= 0 || timeDeltaSec <= 0) return null;

    const ratePerSec = progressDelta / timeDeltaSec; // % per second
    const remainingPct = 100 - currentProgress;
    const remainingSec = remainingPct / ratePerSec;

    if (!isFinite(remainingSec) || remainingSec < 0) return null;

    const mins = Math.round(remainingSec / 60);
    if (mins < 1) return "< 1 min remaining";
    if (mins < 60) return `~${mins} min remaining`;
    return `~${(mins / 60).toFixed(1)} hr remaining`;
  }

  const STATE_COLOR = {
    Idle: "var(--idle)",
    Heating: "var(--warning)",
    Printing: "var(--accent)",
    Cooling: "var(--healthy)",
  };

  function stateTimelineHtml(history) {
    if (!history || history.length === 0) return "";
    const segments = history.map(r => {
      const color = STATE_COLOR[r.status] || "var(--idle)";
      return `<span title="${escapeHtml(r.status)} @ ${escapeHtml(r.timestamp)}" style="flex:1;background:${color};height:100%;display:inline-block;"></span>`;
    }).join("");
    return `
      <div class="bar-label"><span>State timeline (oldest → newest)</span></div>
      <div style="display:flex;height:14px;border-radius:4px;overflow:hidden;gap:1px;background:#0d0f12;">${segments}</div>
    `;
  }

  async function toggleHistory(printerId, panelId, btn) {
    const panel = document.getElementById(panelId);
    const isOpen = panel.classList.contains("open");

    if (isOpen) {
      panel.classList.remove("open");
      openHistoryCards.delete(printerId);
      btn.textContent = "Show history";
      return;
    }

    openHistoryCards.add(printerId);
    btn.textContent = "Hide history";
    panel.classList.add("open");
    panel.innerHTML = `<div class="sparkline-caption">Loading…</div>`;

    try {
      const data = await apiGet(`/printers/${encodeURIComponent(printerId)}/history`);
      const history = (data.history || []).slice().reverse(); // oldest -> newest
      const nozzleTemps = history.map(r => r.nozzle_temperature).filter(v => v !== undefined && v !== null);
      const bedTemps = history.map(r => r.bed_temperature).filter(v => v !== undefined && v !== null);

      const card = btn.closest(".card");
      const currentProgress = card ? Number(card.dataset.progress) : undefined;
      const timeEstimate = estimateTimeRemaining(history, currentProgress);

      panel.innerHTML = `
        <div class="sparkline-wrap">${dualTempChartSvg(nozzleTemps, bedTemps)}</div>
        ${timeEstimate ? `<div class="bar-label" style="margin-top:8px;"><span>Time estimate</span><span>${escapeHtml(timeEstimate)}</span></div>` : ""}
        <div style="margin-top:10px;">${stateTimelineHtml(history)}</div>
      `;
    } catch (err) {
      panel.innerHTML = `<div class="sparkline-caption">Couldn't load history (${escapeHtml(err.message)}).</div>`;
    }
  }

  function renderPrinterCard(p) {
    const statusColor = STATUS_COLOR[p.fog_health_status] || "var(--idle)";
    const alerts = p.fog_alerts || [];
    const panelId = `hist-${p.printer_id}`;
    const wasOpen = openHistoryCards.has(p.printer_id);

    return `
      <div class="card" data-progress="${p.progress !== undefined ? p.progress : ''}" style="--status-color:${statusColor}">
        <div class="card-top">
          <div>
            <div class="printer-id">${escapeHtml(p.printer_id)}</div>
            <div class="job-name">${escapeHtml(p.job_name || "No active job")}</div>
          </div>
          <div class="badge">${escapeHtml(p.fog_health_status || p.status || "Unknown")}</div>
        </div>

        <div class="readouts">
          <div class="readout">
            <div class="readout-label">Nozzle</div>
            <div class="readout-value">${fmtNum(p.nozzle_temperature, 1)}<span class="unit">°C</span></div>
          </div>
          <div class="readout">
            <div class="readout-label">Bed</div>
            <div class="readout-value">${fmtNum(p.bed_temperature, 1)}<span class="unit">°C</span></div>
          </div>
        </div>

        <div class="bar-row">
          <div class="bar-label"><span>Print progress</span><span>${fmtNum(p.progress, 0)}%</span></div>
          <div class="bar-track"><div class="bar-fill progress" style="width:${Math.min(100, p.progress || 0)}%"></div></div>
        </div>

        <div class="bar-row">
          <div class="bar-label"><span>Filament</span><span>${fmtNum(p.filament_level, 0)}%</span></div>
          <div class="bar-track"><div class="bar-fill filament" style="width:${Math.min(100, p.filament_level || 0)}%"></div></div>
        </div>

        ${alerts.length > 0 ? `
          <div class="card-alerts">
            ${alerts.map(a => `<div class="card-alert-item">${escapeHtml(a.type)} — ${escapeHtml(a.severity)}</div>`).join("")}
          </div>
        ` : ""}

        <button class="history-toggle" onclick="toggleHistory('${p.printer_id}', '${panelId}', this)">
          ${wasOpen ? "Hide history" : "Show history"}
        </button>
        <div class="history-panel ${wasOpen ? "open" : ""}" id="${panelId}"></div>
      </div>
    `;
  }

  function renderPrinters(printers) {
    el.content.innerHTML = `<div class="grid">${printers.map(renderPrinterCard).join("")}</div>`;

    // Re-populate any history panels that were open before this refresh
    openHistoryCards.forEach(printerId => {
      const panelId = `hist-${printerId}`;
      const panel = document.getElementById(panelId);
      const btn = panel ? panel.previousElementSibling : null;
      if (panel && btn) {
        panel.classList.remove("open"); // toggleHistory will re-open + refetch
        toggleHistory(printerId, panelId, btn);
      }
    });
  }

  function updateTimestamp() {
    const now = new Date();
    el.lastUpdated.textContent = `Updated ${now.toLocaleTimeString()}`;
  }

  async function refresh() {
    if (!isConfigured()) {
      renderUnconfiguredState();
      return;
    }

    try {
      const [printersData, alertsData] = await Promise.all([
        apiGet("/printers"),
        apiGet("/alerts"),
      ]);

      const printers = printersData.printers || [];

      renderStatusStrip(printers);
      renderAlerts(alertsData.alerts || []);

      if (printers.length === 0) {
        renderEmptyState();
      } else {
        renderPrinters(printers);
      }

      updateTimestamp();
    } catch (err) {
      renderErrorState(err.message);
    }
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(refresh, CONFIG.POLL_INTERVAL_MS);
  }

  el.refreshBtn.addEventListener("click", refresh);

  refresh();
  startPolling();
</script>

</body>
</html>
