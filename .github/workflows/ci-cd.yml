name: PrintGuard CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Sensor Simulator Dependencies
        run: |
          if [ -f sensor_simulator/requirements.txt ]; then
            pip install -r sensor_simulator/requirements.txt
          fi

      - name: Install Fog Node Dependencies
        run: |
          if [ -f fog_node/requirements.txt ]; then
            pip install -r fog_node/requirements.txt
          fi

      - name: Verify Python Files Compile
        run: |
          python -m compileall sensor_simulator
          python -m compileall fog_node

      - name: List Project Structure
        run: |
          ls -R